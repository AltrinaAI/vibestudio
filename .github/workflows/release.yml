name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # tauri-action creates the GitHub Release and uploads assets — needs write.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # webkit2gtk-4.1 + glibc friendly for AppImage
          - platform: macos-latest # Apple silicon — builds one universal (arm64+x86_64) bundle
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ startsWith(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./client/desktop -> target"

      - run: npm ci

      - name: Setup Java for Windows signing
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jsign for Windows signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "7.4"
          $dest = "$env:RUNNER_TEMP\jsign.jar"
          Invoke-WebRequest -Uri "https://github.com/ebourg/jsign/releases/download/$version/jsign-$version.jar" -OutFile $dest
          "JSIGN_JAR=$dest" >> $env:GITHUB_ENV

      - name: Azure login for Windows signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID)) {
            Write-Warning "Azure signing secrets not set; Windows artifacts will be built unsigned."
            exit 0
          }
          az login --service-principal -u $env:AZURE_CLIENT_ID -p $env:AZURE_CLIENT_SECRET --tenant $env:AZURE_TENANT_ID | Out-Null
          "AZURE_SIGNING_ENDPOINT=${{ secrets.AZURE_SIGNING_ENDPOINT }}" >> $env:GITHUB_ENV
          "AZURE_SIGNING_ALIAS=${{ secrets.AZURE_SIGNING_ALIAS }}" >> $env:GITHUB_ENV

      # NOTE: the on-device llama.cpp engine + CUDA bridge are no longer bundled.
      # Commit-message drafting defaults to shelling out to a logged-in coding-agent
      # CLI (see skill-core/commit_agent.rs); the engine is an opt-in offline
      # backend the user provides (scripts/fetch-engine.sh + SKILL_STUDIO_LLAMA_SERVER).

      # Stamp the release version (the pushed tag, minus the leading `v`) into the
      # server workspace and desktop package so both binaries build at the tag version.
      # Skipped on manual runs (workflow_dispatch has no tag), which then build the
      # committed 0.0.0 dev placeholder as-is.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: bash scripts/stamp-version.sh "${GITHUB_REF_NAME#v}"

      # Fail in seconds, not after four full builds: a bundle carrying the
      # placeholder pubkey could never verify any update signature.
      - name: Guard updater pubkey
        shell: bash
        run: |
          if grep -q UPDATER_PUBKEY_PLACEHOLDER client/desktop/tauri.conf.json; then
            echo "plugins.updater.pubkey is still the placeholder — commit the real public key first" >&2
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub runners lack FUSE, so AppImage's bundler (linuxdeploy / appimagetool)
          # fails to mount its tools ("failed to run linuxdeploy"). This makes them
          # self-extract and run without FUSE. No-op on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # macOS code signing (Developer ID) + notarization: with these set,
          # tauri-action imports the cert and `tauri build` signs, notarizes, and
          # staples automatically. APPLE_SIGNING_IDENTITY overrides the ad-hoc "-"
          # in tauri.conf.json; the vars are ignored on the Windows/Linux legs.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Updater artifact signing (minisign .sig files, separate from OS code
          # signing). Unset password defaults to empty on CI.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Skill Studio ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # latest.json's platforms map is merged across the 4 parallel matrix legs
          # (re-download + retry on asset-id conflicts), so retries matter here.
          includeUpdaterJson: true
          retryAttempts: 3
          # Per-platform args (&& / || precedence: each `A && B` resolves before the `||`s):
          #  • macOS → `--target universal-apple-darwin`: one universal (arm64+x86_64) .dmg
          #    built on the fast Apple-Silicon runner; the slow macos-15-intel leg is gone
          #    (it took ~3x as long for identical output).
          #  • Linux → `--bundles deb`: ship only the .deb and SKIP AppImage. Tauri's
          #    AppImage bundler (linuxdeploy) is currently flaky on GitHub runners — it
          #    fails even with APPIMAGE_EXTRACT_AND_RUN=1 (upstream tauri#14796, open) —
          #    and a failed AppImage fails the whole job, so the working .deb never
          #    uploads. The .deb is a fine Ubuntu/Debian installer; re-enable AppImage by
          #    dropping this branch once upstream is fixed (the env var above is kept ready).
          #  • Windows ships UNSIGNED for now: no signCommand/cert is configured
          #    (signCommand was removed from tauri.conf.json; --no-sign was dropped
          #    because it also suppressed the updater .sig files). Re-enable
          #    Authenticode by restoring signCommand + the cert secrets.
          args: ${{ startsWith(matrix.platform, 'macos') && '--target universal-apple-darwin' || startsWith(matrix.platform, 'ubuntu') && '--bundles deb' || '' }}

      # Updater .sig files are redundant as release assets — tauri-action embeds each
      # signature INLINE in latest.json (the updater never fetches the .sig). Drop them
      # at the source, right after this leg's upload, so the draft never carries them.
      # NB: the release is still a DRAFT here, and `releases/tags/<tag>` resolves only
      # published releases — look the draft up via the list endpoint instead.
      - name: Drop redundant .sig assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          rid=$(gh api "repos/$GH_REPO/releases?per_page=30" \
            --jq "[.[] | select(.tag_name == \"$GITHUB_REF_NAME\")][0].id // empty")
          [ -n "$rid" ] || { echo "no release for $GITHUB_REF_NAME yet — nothing to drop"; exit 0; }
          gh api "repos/$GH_REPO/releases/$rid/assets?per_page=100" \
            --jq '.[] | select(.name | endswith(".sig")) | .id' |
          while read -r id; do
            # Legs run in parallel and each sweeps ALL sigs — a 404 here just
            # means another leg won the race, which is the desired end state.
            gh api -X DELETE "repos/$GH_REPO/releases/assets/$id" 2>/dev/null \
              && echo "deleted sig asset $id" || echo "sig asset $id already gone"
          done

      - name: Upload desktop bundles
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-studio-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            client/desktop/target/release/bundle/deb/*.deb
            client/desktop/target/release/bundle/nsis/*.exe
            client/desktop/target/release/bundle/nsis/*.msi
            client/desktop/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            client/desktop/target/universal-apple-darwin/release/bundle/macos/*.app
            client/desktop/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz

  # Standalone `skill-server` binaries for the Remote-SSH feature. The desktop app
  # provisions one onto a remote host on demand (VS Code-style: the remote curls it,
  # with a local-download-piped-over-ssh fallback). Static musl on Linux so glibc skew
  # on old remotes never bites; native builds on macOS. Uploaded to the SAME release
  # as the desktop bundles (needs: build, which creates the draft via tauri-action).
  # The desktop fetches the asset from the release tag matching its own version (the
  # "Sync app version from tag" step above stamps that version), so a fresh remote
  # downloads the right binary. (Build-time override: SKILL_STUDIO_SERVER_BASE_URL.)
  server-binaries:
    name: skill-server (${{ matrix.target }})
    # Run AFTER build (so the draft release usually exists) but NOT gated on its
    # success: a flaky desktop leg (signing/notarization) must not skip the server
    # binaries, or Remote-SSH can't provision that release. The job ensures the release
    # exists itself before uploading.
    needs: build
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            musl: true
          - runner: ubuntu-22.04-arm # GitHub-hosted arm64 Linux runner
            target: aarch64-unknown-linux-musl
            musl: true
          - runner: macos-latest # Apple silicon
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install musl toolchain (Linux)
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Stamp the server workspace so the standalone binary's `--version` matches the
      # release it ships in (this job checks out fresh, so it must stamp too).
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: bash scripts/stamp-version.sh "${GITHUB_REF_NAME#v}"

      # The standalone binary is the phone's hub while SSH-connected, so it must
      # carry the SPA: build dist/, then compile it in via embed-ui (include_dir).
      - name: Build the UI (embedded into the binary)
        run: npm ci && npm run build

      # Builds ONLY skill-server (+ skill-core/skill-term) — no tauri/webkit deps, so
      # the static musl link is clean and fast.
      - name: Build skill-server
        env:
          CARGO_NET_RETRY: 10
        run: cargo build --release -p skill-server --bin skill-server --features embed-ui --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          out="skill-server-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/skill-server" "$out"
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$out" > "$out.sha256"; else shasum -a 256 "$out" > "$out.sha256"; fi

      # The draft is normally created by tauri-action in `build`; create it if a build
      # failure meant it never got made (|| true tolerates the matrix-leg race).
      - name: Ensure the release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --draft \
              --title "Skill Studio ${{ github.ref_name }}" \
              --notes "Desktop bundles and standalone skill-server binaries." || true

      - name: Upload to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "skill-server-${{ matrix.target }}" "skill-server-${{ matrix.target }}.sha256" --clobber
