name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    # tauri-action creates the GitHub Release and uploads assets — needs write.
    permissions:
      contents: write
    # Single source of truth for the llama.cpp build that BOTH the CPU engine and
    # the CUDA bridge are pinned to (ggml backends are only ABI-compatible within
    # one build) plus the CUDA arch set — referenced by the vendor steps and the
    # bridge cache key so a tag/arch bump can never serve a stale, mismatched bridge.
    env:
      LLAMA_BUILD: b9486
      # RTX 30/40/50 (Ampere/Ada/Blackwell). Datacenter (A100/H100) and pre-Ampere
      # (RTX 20 / GTX 16) are omitted to keep the bridge ~128 MB — those fall back
      # to CPU. Widen here if needed; the cache key includes this so it auto-rebuilds.
      CUDA_ARCHS: "86;89;120"
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # webkit2gtk-4.1 + glibc friendly for AppImage
          - platform: macos-latest # Apple silicon
          - platform: macos-15-intel # Intel (macos-13 retired Dec 2025; this is the last Intel image, retiring Fall 2027)
          - platform: windows-latest
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file \
            libxdo-dev libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./client/desktop -> target"

      - run: npm ci

      - name: Setup Java for Windows signing
        if: matrix.platform == 'windows-latest'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Download jsign for Windows signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "7.4"
          $dest = "$env:RUNNER_TEMP\jsign.jar"
          Invoke-WebRequest -Uri "https://github.com/ebourg/jsign/releases/download/$version/jsign-$version.jar" -OutFile $dest
          "JSIGN_JAR=$dest" >> $env:GITHUB_ENV

      - name: Azure login for Windows signing
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID)) {
            Write-Warning "Azure signing secrets not set; Windows artifacts will be built unsigned."
            exit 0
          }
          az login --service-principal -u $env:AZURE_CLIENT_ID -p $env:AZURE_CLIENT_SECRET --tenant $env:AZURE_TENANT_ID | Out-Null
          "AZURE_SIGNING_ENDPOINT=${{ secrets.AZURE_SIGNING_ENDPOINT }}" >> $env:GITHUB_ENV
          "AZURE_SIGNING_ALIAS=${{ secrets.AZURE_SIGNING_ALIAS }}" >> $env:GITHUB_ENV

      # The on-device llama.cpp engine is declared as a Tauri bundle resource
      # (client/desktop/binaries/<triple>/) but is gitignored, so it must be vendored
      # per-runner before `tauri build` or the build aborts with
      # "resource path `binaries` doesn't exist". Pinned for reproducible releases.
      - name: Setup Python (engine vendor script)
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Vendor llama.cpp engine into client/desktop/binaries
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-engine.sh

      # Optional CUDA GPU backend bridge (libggml-cuda.so / ggml-cuda.dll),
      # ABI-matched to the engine above. We do NOT ship the CUDA runtime — the
      # bridge links the user's own CUDA install (driver+runtime present → GPU,
      # absent → CPU). Linux is built from source in a CUDA image (slow; no Linux
      # CUDA prebuilt exists), so cache it per build-tag+arch-set. Windows pulls
      # the official prebuilt DLL. macOS is skipped (Metal is compiled in).
      - name: Cache CUDA backend bridge
        id: cuda-bridge
        if: startsWith(matrix.platform, 'ubuntu') || matrix.platform == 'windows-latest'
        uses: actions/cache@v4
        with:
          path: |
            client/desktop/binaries/*/libggml-cuda.so
            client/desktop/binaries/*/ggml-cuda.dll
          key: cuda-bridge-${{ matrix.platform }}-${{ env.LLAMA_BUILD }}-${{ env.CUDA_ARCHS }}

      - name: Vendor CUDA backend bridge
        if: (startsWith(matrix.platform, 'ubuntu') || matrix.platform == 'windows-latest') && steps.cuda-bridge.outputs.cache-hit != 'true'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/fetch-cuda-backend.sh

      # Stamp the release version (the pushed tag, minus the leading `v`) into the ONE
      # source of truth — [workspace.package].version in the root Cargo.toml — so every
      # crate, the Tauri app/bundle names (tauri.conf.json has no `version`, so it reads
      # CARGO_PKG_VERSION), and the standalone skill-server all build at the tag version.
      # Skipped on manual runs (workflow_dispatch has no tag), which then build the
      # committed 0.0.0 dev placeholder as-is.
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: bash scripts/stamp-version.sh "${GITHUB_REF_NAME#v}"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub runners lack FUSE, so AppImage's bundler (linuxdeploy / appimagetool)
          # fails to mount its tools ("failed to run linuxdeploy"). This makes them
          # self-extract and run without FUSE. No-op on macOS/Windows.
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # macOS signing / notarization (add as repo secrets when ready):
          # APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          # APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
        with:
          projectPath: client/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Agent Skill Studio ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          # Per-platform args (&& / || precedence: each `A && B` resolves before the `||`s):
          #  • Linux → `--bundles deb`: ship only the .deb and SKIP AppImage. Tauri's
          #    AppImage bundler (linuxdeploy) is currently flaky on GitHub runners — it
          #    fails even with APPIMAGE_EXTRACT_AND_RUN=1 (upstream tauri#14796, open) —
          #    and a failed AppImage fails the whole job, so the working .deb never
          #    uploads. The .deb is a fine Ubuntu/Debian installer; re-enable AppImage by
          #    dropping this branch once upstream is fixed (the env var above is kept ready).
          #  • Windows ships UNSIGNED for now (no cert): --no-sign skips signing entirely.
          #    Re-enable by dropping the `--no-sign` branch (signCommand + script are kept).
          args: ${{ matrix.platform == 'macos-15-intel' && '--target x86_64-apple-darwin' || matrix.platform == 'windows-latest' && '--no-sign' || startsWith(matrix.platform, 'ubuntu') && '--bundles deb' || '' }}

      - name: Upload desktop bundles
        if: ${{ always() && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-studio-${{ matrix.platform }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            client/desktop/target/release/bundle/deb/*.deb
            client/desktop/target/release/bundle/dmg/*.dmg
            client/desktop/target/release/bundle/macos/*.app
            client/desktop/target/release/bundle/macos/*.app.tar.gz
            client/desktop/target/release/bundle/nsis/*.exe
            client/desktop/target/release/bundle/nsis/*.msi
            client/desktop/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
            client/desktop/target/x86_64-apple-darwin/release/bundle/macos/*.app
            client/desktop/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz

  # Standalone `skill-server` binaries for the Remote-SSH feature. The desktop app
  # provisions one onto a remote host on demand (VS Code-style: the remote curls it,
  # with a local-download-piped-over-ssh fallback). Static musl on Linux so glibc skew
  # on old remotes never bites; native builds on macOS. Uploaded to the SAME release
  # as the desktop bundles (needs: build, which creates the draft via tauri-action).
  # The desktop fetches the asset from the release tag matching its own version (the
  # "Sync app version from tag" step above stamps that version), so a fresh remote
  # downloads the right binary. (Build-time override: SKILL_STUDIO_SERVER_BASE_URL.)
  server-binaries:
    name: skill-server (${{ matrix.target }})
    # Run AFTER build (so the draft release usually exists) but NOT gated on its
    # success: a flaky desktop leg (signing/notarization) must not skip the server
    # binaries, or Remote-SSH can't provision that release. The job ensures the release
    # exists itself before uploading.
    needs: build
    if: ${{ always() && startsWith(github.ref, 'refs/tags/v') }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            musl: true
          - runner: ubuntu-22.04-arm # GitHub-hosted arm64 Linux runner
            target: aarch64-unknown-linux-musl
            musl: true
          - runner: macos-latest # Apple silicon
            target: aarch64-apple-darwin
          - runner: macos-15-intel
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install musl toolchain (Linux)
        if: matrix.musl
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      # Stamp the same single source so the standalone binary's `--version` matches the
      # release it ships in (this job checks out fresh, so it must stamp too).
      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: bash scripts/stamp-version.sh "${GITHUB_REF_NAME#v}"

      # Builds ONLY skill-server (+ skill-core/skill-term) — no tauri/webkit deps, so
      # the static musl link is clean and fast.
      - name: Build skill-server
        run: cargo build --release -p skill-server --bin skill-server --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          out="skill-server-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/skill-server" "$out"
          if command -v sha256sum >/dev/null 2>&1; then sha256sum "$out" > "$out.sha256"; else shasum -a 256 "$out" > "$out.sha256"; fi

      # The draft is normally created by tauri-action in `build`; create it if a build
      # failure meant it never got made (|| true tolerates the matrix-leg race).
      - name: Ensure the release exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${{ github.ref_name }}" >/dev/null 2>&1 || \
            gh release create "${{ github.ref_name }}" --draft \
              --title "Agent Skill Studio ${{ github.ref_name }}" \
              --notes "Desktop bundles and standalone skill-server binaries." || true

      - name: Upload to the release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" "skill-server-${{ matrix.target }}" "skill-server-${{ matrix.target }}.sha256" --clobber
