<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <!-- interactive-widget: the soft keyboard must resize the layout (Chromium
         defaults to resizes-visual since 108, leaving h-dvh full-height with the
         terminal buried under the keyboard). WebKit ignores this key — that path
         is lib/softKeyboard.ts. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content"
    />
    <!-- Tracks the OS scheme only (the in-app toggle can diverge); matches --bg. -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0f1518" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Home-screen install (iOS: Add to Home Screen unlocks Web Push). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Skill Studio</title>
    <!-- Set the theme class before paint to avoid a flash of the wrong theme. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("skillviewer-theme");
          if (!t) t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="min-h-full">
    <div id="root"></div>
    <script type="module" src="/client/web/main.tsx"></script>
  </body>
</html>
